<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 

.math-symbols {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .math-symbols span {
    font-size: 1.4rem;
    color: var(--accent);
    opacity: 0.7;
    display: inline-block;
    animation: floatSymbol 3s ease-in-out infinite;
  }

  .math-symbols span:nth-child(1)  { animation-delay: 0.0s; }
  .math-symbols span:nth-child(2)  { animation-delay: 0.2s; }
  .math-symbols span:nth-child(3)  { animation-delay: 0.4s; }
  .math-symbols span:nth-child(4)  { animation-delay: 0.6s; }
  .math-symbols span:nth-child(5)  { animation-delay: 0.8s; }
  .math-symbols span:nth-child(6)  { animation-delay: 1.0s; }
  .math-symbols span:nth-child(7)  { animation-delay: 1.2s; }
  .math-symbols span:nth-child(8)  { animation-delay: 1.4s; }
  .math-symbols span:nth-child(9)  { animation-delay: 1.6s; }
  .math-symbols span:nth-child(10) { animation-delay: 1.8s; }

  @keyframes floatSymbol {
    0%   { transform: translateY(0px)   rotate(0deg);   opacity: 0.4; }
    50%  { transform: translateY(-10px) rotate(10deg);  opacity: 1;   }
    100% { transform: translateY(0px)   rotate(0deg);   opacity: 0.4; }
  }
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c6ef7;
    --accent2: #f7c66e;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --success: #5effa0;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Nunito', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  /* background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  /* glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,110,247,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 760px;
    position: relative;
    z-index: 1;
  }

  /* header */
  header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.6s ease both;
  }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 1rem;
    letter-spacing: 0.08em;
  }

  h1 {
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  h1 span {
    color: var(--accent);
    position: relative;
  }

  h1 span::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    height: 3px;
    background: var(--accent2);
    border-radius: 2px;
  }

  .subtitle {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.95rem;
    font-family: var(--mono);
  }

  /* card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s ease both;
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.95rem;
    padding: 1rem;
    resize: vertical;
    min-height: 110px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 0.75rem;
  }

  .ex-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ex-btn:hover { color: var(--accent); border-color: var(--accent); }

  .solve-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.9rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .solve-btn:hover { background: #9589ff; transform: translateY(-1px); }
  .solve-btn:active { transform: translateY(0); }
  .solve-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* loading */
  .loader {
    display: none;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    margin-top: 1rem;
  }
  .loader.show { display: flex; }

  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  /* result */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .result-card.show { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(124,110,247,0.06);
  }

  .answer-pill {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .answer-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .answer-value {
    font-family: var(--mono);
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--success);
  }

  .confidence {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .confidence span {
    color: var(--accent2);
    font-weight: 500;
  }

  .solution-body {
    padding: 1.5rem;
    font-family: var(--mono);
    font-size: 0.85rem;
    line-height: 1.8;
    color: #c0c0d8;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
  }

  .solution-body::-webkit-scrollbar { width: 4px; }
  .solution-body::-webkit-scrollbar-track { background: transparent; }
  .solution-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* error */
  .error-msg {
    display: none;
    font-family: var(--mono);
    font-size: 13px;
    color: #ff7070;
    background: rgba(255,112,112,0.08);
    border: 1px solid rgba(255,112,112,0.2);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    margin-top: 1rem;
  }
  .error-msg.show { display: block; }

  /* footer */
  footer {
    margin-top: 2rem;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  /* animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40%           { transform: scale(1);   opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
     <div class="math-symbols" aria-hidden="true">
     <span>∑</span><span>∫</span><span>π</span><span>√</span><span>∞</span><span>±</span><span>∂</span><span>Δ</span><span>θ</span><span>λ</span>
     </div>
     <div class="badge">\__/</div>
     <h1>Math <span>Agent</span></h1>
     <p class="subtitle">step-by-step reasoning · powered by rl fine-tuning</p>
  </header>

  <div class="card">
    <label>Your Math Problem</label>
    <textarea id="question" placeholder="e.g. If a train travels 60 km/h for 2.5 hours, how far does it go?"></textarea>

    <div class="examples">
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted);align-self:center">try:</span>
      <button class="ex-btn" onclick="setExample(this)">Janet has 16 eggs/day, eats 3 for breakfast, bakes 4 into muffins. She sells the rest for $2/egg. How much does she make daily?</button>
      <button class="ex-btn" onclick="setExample(this)">A robe takes 2 bolts of blue fiber and half that much white. How many bolts total?</button>
      <button class="ex-btn" onclick="setExample(this)">James runs 3 sprints, 3 times a week. Each sprint is 60 meters. How many meters per week?</button>
    </div>

    <button class="solve-btn" id="solveBtn" onclick="solve()">Solve →</button>

    <div class="loader" id="loader">
      <div class="dots"><span></span><span></span><span></span></div>
      thinking step by step...
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="answer-pill">
        <span class="answer-label">Answer</span>
        <span class="answer-value" id="answerVal">—</span>
      </div>
      <div class="confidence" id="confVal"></div>
    </div>
    <div class="solution-body" id="solutionBody"></div>
  </div>

  <footer>math-rl-agent · try your shot · have fun!</footer>

</div>

<script>
  function setExample(btn) {
    document.getElementById('question').value = btn.textContent.trim();
  }

  async function solve() {
    const question = document.getElementById('question').value.trim();
    if (!question) return;

    const btn = document.getElementById('solveBtn');
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('errorMsg');
    const resultCard = document.getElementById('resultCard');

    // reset
    btn.disabled = true;
    loader.classList.add('show');
    errorMsg.classList.remove('show');
    resultCard.classList.remove('show');

    try {
      const res = await fetch('/solve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Something went wrong');
      }

      // show result
      document.getElementById('answerVal').textContent =
        data.answer !== null ? data.answer : '?';
      document.getElementById('confVal').innerHTML =
        `confidence <span>${Math.round(data.confidence * 100)}%</span>`;
      document.getElementById('solutionBody').textContent = data.solution;
      resultCard.classList.add('show');

    } catch (err) {
      errorMsg.textContent = '⚠ ' + err.message;
      errorMsg.classList.add('show');
    } finally {
      btn.disabled = false;
      loader.classList.remove('show');
    }
  }

  // Ctrl+Enter to solve
  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) solve();
  });
</script>
</body>
</html>
