<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #1e1e2e;
    --accent: #7c6ef7;
    --accent2: #f7c66e;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --success: #5effa0;
    --danger: #ff7070;
    --bot: #f06ef7;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Nunito', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(124,110,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-symbols { display: flex; gap: 5px; }
  .logo-symbols span {
    font-size: 1rem;
    color: var(--accent);
    display: inline-block;
    animation: floatSymbol 3s ease-in-out infinite;
  }
  .logo-symbols span:nth-child(2) { animation-delay: 0.3s; }
  .logo-symbols span:nth-child(3) { animation-delay: 0.6s; }
  .logo-symbols span:nth-child(4) { animation-delay: 0.9s; }
  .logo-symbols span:nth-child(5) { animation-delay: 1.2s; }

  @keyframes floatSymbol {
    0%,100% { transform: translateY(0) rotate(0deg); opacity:0.5; }
    50%      { transform: translateY(-5px) rotate(8deg); opacity:1; }
  }

  .logo-text { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }
  .logo-text span { color: var(--accent); }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .bot-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--bot);
    background: rgba(240,110,247,0.1);
    border: 1px solid rgba(240,110,247,0.3);
    border-radius: 20px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--sans);
  }
  .bot-toggle:hover { background: rgba(240,110,247,0.2); }
  .bot-toggle .dot {
    width: 7px; height: 7px;
    background: var(--bot);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.5; transform:scale(0.8); }
  }

  /* LAYOUT */
  .content-wrap {
    display: flex;
    flex: 1;
    transition: all 0.35s cubic-bezier(.4,0,.2,1);
  }

  /* MATH PANEL */
  .main-panel {
    flex: 1;
    padding: 2rem;
    max-width: 760px;
    margin: 0 auto;
    transition: all 0.35s;
    animation: fadeUp 0.5s ease both;
  }

  .content-wrap.bot-open .main-panel {
    max-width: 100%;
    margin: 0;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 1rem;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .examples { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 0.75rem; }
  .ex-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ex-btn:hover { color: var(--accent); border-color: var(--accent); }

  .solve-btn {
    width: 100%;
    margin-top: 1rem;
    padding: 0.85rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .solve-btn:hover { background: #9589ff; transform: translateY(-1px); }
  .solve-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .loader {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-top: 0.75rem;
  }
  .loader.show { display: flex; }
  .dots span {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform:scale(0.6); opacity:0.4; }
    40%          { transform:scale(1); opacity:1; }
  }

  .error-msg {
    display: none;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--danger);
    background: rgba(255,112,112,0.08);
    border: 1px solid rgba(255,112,112,0.2);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    margin-top: 0.75rem;
  }
  .error-msg.show { display: block; }

  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.35s ease both;
  }
  .result-card.show { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: rgba(124,110,247,0.06);
  }

  .answer-pill { display: flex; align-items: center; gap: 8px; }
  .answer-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .answer-value { font-family: var(--mono); font-size: 1.3rem; font-weight: 500; color: var(--success); }
  .confidence { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .confidence span { color: var(--accent2); font-weight: 600; }

  .solution-body {
    padding: 1.25rem;
    font-family: var(--mono);
    font-size: 0.82rem;
    line-height: 1.8;
    color: #c0c0d8;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 320px;
    overflow-y: auto;
  }
  .solution-body::-webkit-scrollbar { width: 3px; }
  .solution-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* SIDE BOT PANEL */
  .bot-panel {
    width: 0;
    overflow: hidden;
    border-left: 1px solid transparent;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    transition: all 0.35s cubic-bezier(.4,0,.2,1);
  }

  .bot-panel.open {
    width: 360px;
    min-width: 320px;
    border-left-color: var(--border);
  }

  .bot-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: rgba(240,110,247,0.05);
  }

  .bot-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    color: var(--bot);
  }

  .bot-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .bot-close:hover { color: var(--text); }

  .bot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bot-messages::-webkit-scrollbar { width: 3px; }
  .bot-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 90%;
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    animation: msgIn 0.25s ease both;
  }
  @keyframes msgIn {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-radius: 12px 12px 2px 12px;
  }

  .msg.bot {
    align-self: flex-start;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px 12px 12px 2px;
  }

  .msg.bot.thinking {
    color: var(--muted);
    font-style: italic;
    font-size: 12px;
  }

  .quick-questions {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .quick-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .quick-btns { display: flex; flex-wrap: wrap; gap: 5px; }
  .quick-btn {
    font-size: 11px;
    color: var(--bot);
    background: rgba(240,110,247,0.08);
    border: 1px solid rgba(240,110,247,0.2);
    border-radius: 20px;
    padding: 3px 9px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
  }
  .quick-btn:hover { background: rgba(240,110,247,0.18); }

  .bot-input-area {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .bot-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .bot-input:focus { border-color: var(--bot); }
  .bot-input::placeholder { color: var(--muted); font-size: 12px; }

  .bot-send {
    background: var(--bot);
    border: none;
    border-radius: 8px;
    color: #fff;
    width: 34px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .bot-send:hover { background: #f59efa; }

  .bot-welcome {
    text-align: center;
    padding: 1.5rem 1rem;
    color: var(--muted);
  }
  .bot-welcome .icon { font-size: 2rem; margin-bottom: 8px; }
  .bot-welcome p { font-size: 13px; line-height: 1.6; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  footer {
    padding: 1rem 2rem;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  @media (max-width: 700px) {
    .bot-panel.open { width: 100vw; position: fixed; inset: 0; z-index: 200; }
    .topbar { padding: 0.75rem 1rem; }
    .main-panel { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="logo">
      <div class="logo-symbols">
        <span>∑</span><span>∫</span><span>√</span><span>π</span><span>∞</span>
      </div>
      <div class="logo-text">Math <span>Agent</span></div>
    </div>
    <div class="topbar-right">
      <div class="badge">__/--\__</div>
      <button class="bot-toggle" onclick="toggleBot()">
        <div class="dot"></div>
        Concept Bot
      </button>
    </div>
  </header>

  <div class="content-wrap" id="contentWrap">

    <main class="main-panel">
      <div class="card">
        <div class="section-label">Math Problem</div>
        <textarea id="question" placeholder="e.g. If a train travels 60 km/h for 2.5 hours, how far does it go?"></textarea>

        <div class="examples">
          <span style="font-family:var(--mono);font-size:10px;color:var(--muted);align-self:center">try →</span>
          <button class="ex-btn" onclick="setExample(this)">Janet has 16 eggs/day, eats 3, bakes 4. Sells rest for $2. Daily earnings?</button>
          <button class="ex-btn" onclick="setExample(this)">A robe takes 2 bolts blue + half white. Total bolts?</button>
          <button class="ex-btn" onclick="setExample(this)">James runs 3 sprints × 3 times/week × 60m each. Weekly total?</button>
        </div>

        <button class="solve-btn" id="solveBtn" onclick="solve()">Solve →</button>
        <div class="loader" id="loader"><div class="dots"><span></span><span></span><span></span></div> thinking...</div>
        <div class="error-msg" id="errorMsg"></div>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result-header">
          <div class="answer-pill">
            <span class="answer-label">Answer</span>
            <span class="answer-value" id="answerVal">—</span>
          </div>
          <div class="confidence" id="confVal"></div>
        </div>
        <div class="solution-body" id="solutionBody"></div>
      </div>
    </main>

    <aside class="bot-panel" id="botPanel">
      <div class="bot-header">
        <div class="bot-title">🤖 Concept Bot</div>
        <button class="bot-close" onclick="toggleBot()">✕</button>
      </div>

      <div class="bot-messages" id="botMessages">
        <div class="bot-welcome">
          <div class="icon">🤖</div>
          <p>Koi bhi math concept poochho — GRPO, integration, derivatives, probability, ya kuch bhi!</p>
        </div>
      </div>

      <div class="quick-questions">
        <div class="quick-label">Quick questions</div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="askBot('What is GRPO?')">What is GRPO?</button>
          <button class="quick-btn" onclick="askBot('Explain KL divergence simply')">KL divergence?</button>
          <button class="quick-btn" onclick="askBot('What is integration?')">Integration?</button>
          <button class="quick-btn" onclick="askBot('What is a derivative?')">Derivative?</button>
          <button class="quick-btn" onclick="askBot('What is probability?')">Probability?</button>
        </div>
      </div>

      <div class="bot-input-area">
        <input class="bot-input" id="botInput" placeholder="Ask any math concept..." onkeydown="if(event.key==='Enter') sendBot()"/>
        <button class="bot-send" onclick="sendBot()">→</button>
      </div>
    </aside>

  </div>

  <footer>math-agent · rl + grpo + groq · ctrl+enter to solve</footer>
</div>

<script>
  let botOpen = false;

  function toggleBot() {
    botOpen = !botOpen;
    document.getElementById('botPanel').classList.toggle('open', botOpen);
    document.getElementById('contentWrap').classList.toggle('bot-open', botOpen);
  }

  function setExample(btn) {
    document.getElementById('question').value = btn.textContent.trim();
  }

  async function solve() {
    const question = document.getElementById('question').value.trim();
    if (!question) return;
    const btn = document.getElementById('solveBtn');
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('errorMsg');
    const resultCard = document.getElementById('resultCard');

    btn.disabled = true;
    loader.classList.add('show');
    errorMsg.classList.remove('show');
    resultCard.classList.remove('show');

    try {
      const res = await fetch('/solve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');
      document.getElementById('answerVal').textContent = data.answer !== null ? data.answer : '?';
      document.getElementById('confVal').innerHTML = `confidence <span>${Math.round(data.confidence * 100)}%</span>`;
      document.getElementById('solutionBody').textContent = data.solution;
      resultCard.classList.add('show');
    } catch (err) {
      errorMsg.textContent = '⚠ ' + err.message;
      errorMsg.classList.add('show');
    } finally {
      btn.disabled = false;
      loader.classList.remove('show');
    }
  }

  function addMsg(text, type) {
    const msgs = document.getElementById('botMessages');
    const welcome = msgs.querySelector('.bot-welcome');
    if (welcome) welcome.remove();
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function askBot(question) {
    if (!botOpen) toggleBot();
    if (!question.trim()) return;
    document.getElementById('botInput').value = '';
    addMsg(question, 'user');
    const thinking = addMsg('thinking...', 'bot thinking');
    try {
      const res = await fetch('/concept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();
      thinking.remove();
      addMsg(data.answer || 'Sorry, kuch problem aayi.', 'bot');
    } catch {
      thinking.remove();
      addMsg('Server se connect nahi ho pa raha.', 'bot');
    }
  }

  function sendBot() {
    const input = document.getElementById('botInput');
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    askBot(q);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) solve();
  });
</script>
</body>
</html>
